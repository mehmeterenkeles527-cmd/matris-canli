<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matris Canlı Önizleme</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      background-color: #0f0f0f;
      color: #fff;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .display-box {
      border: 3px solid #333;
      padding: 20px;
      border-radius: 12px;
      background: #000;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
    }
    .led-text {
      font-size: 28px;
      color: #ff0000;
      letter-spacing: 4px;
      text-shadow: 0 0 8px #ff0000, 0 0 15px #ff0000;
      white-space: nowrap;
      overflow: hidden;
      width: 250px;
      display: inline-block;
    }
    marquee {
      width: 100%;
    }
  </style>
</head>
<body>
  <h2>📺 CANLI MATRİS ÖNİZLEME</h2>
  <div class="display-box">
    <div class="led-text">
      <marquee id="kayanYazi" scrollamount="6">SISTEM HAZIR</marquee>
    </div>
  </div>
  <p style="color: #666; font-size: 12px; margin-top: 20px;">ESP8266 LED Matris Senkronize Simülasyonu</p>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const yazi = urlParams.get('yazi') || "SISTEM HAZIR";
    document.getElementById('kayanYazi').innerText = decodeURIComponent(yazi);
  </script>
</body>
</html>
