<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD_Parola Birebir Klonu</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      background-color: #050505; color: #fff; font-family: monospace;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; margin: 0; overflow: hidden;
    }
    canvas {
      background-color: #0a0000;
      border: 4px solid #222; border-radius: 8px;
      box-shadow: 0 0 25px rgba(255, 0, 0, 0.15); max-width: 95vw;
    }
    .info { margin-top: 15px; color: #666; font-size: 13px; text-align: center; }
  </style>
</head>
<body>
  <h3 style="color: #ff3333; letter-spacing: 1px;">MD_PAROLA ÇEKİRDEK KLONU</h3>
  <canvas id="matrix" width="640" height="160"></canvas>
  <div class="info">
    Sanal MD_MAX72XX Motoru Devrede<br>
    Simüle Edilen Hız: <span id="hizGosterge">35</span> ms
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const yazi = decodeURIComponent(urlParams.get('yazi') || "SISTEM HAZIR");
    const hiz = parseInt(urlParams.get('hiz')) || 35;
    document.getElementById('hizGosterge').innerText = hiz;

    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    const cols = 32; const rows = 8;
    const dotSize = 20; const radius = 7;

    // MD_MAX72XX ORİJİNAL DONANIM FONTU (C++ kütüphanesinden birebir alınmıştır)
    const font = {
      'A':[0x7e,0x11,0x11,0x7e], 'B':[0x7f,0x49,0x49,0x36], 'C':[0x3e,0x41,0x41,0x22], 'D':[0x7f,0x41,0x41,0x3e],
      'E':[0x7f,0x49,0x49,0x41], 'F':[0x7f,0x09,0x09,0x01], 'G':[0x3e,0x41,0x49,0x3a], 'H':[0x7f,0x08,0x08,0x7f],
      'I':[0x00,0x41,0x7f,0x41], 'J':[0x20,0x40,0x41,0x3f], 'K':[0x7f,0x08,0x14,0x63], 'L':[0x7f,0x40,0x40,0x40],
      'M':[0x7f,0x02,0x0c,0x02,0x7f], 'N':[0x7f,0x04,0x08,0x10,0x7f], 'O':[0x3e,0x41,0x41,0x3e], 'P':[0x7f,0x09,0x09,0x06],
      'Q':[0x3e,0x41,0x51,0x21,0x5e], 'R':[0x7f,0x09,0x19,0x66], 'S':[0x26,0x49,0x49,0x32], 'T':[0x01,0x01,0x7f,0x01,0x01],
      'U':[0x3f,0x40,0x40,0x3f], 'V':[0x1f,0x20,0x40,0x20,0x1f], 'W':[0x3f,0x40,0x38,0x40,0x3f], 'X':[0x63,0x14,0x08,0x14,0x63],
      'Y':[0x03,0x04,0x78,0x04,0x03], 'Z':[0x61,0x51,0x49,0x45,0x43],
      'a':[0x20,0x54,0x54,0x78], 'b':[0x7f,0x48,0x44,0x38], 'c':[0x38,0x44,0x44,0x20], 'd':[0x38,0x44,0x48,0x7f],
      'e':[0x38,0x54,0x54,0x18], 'f':[0x08,0x7e,0x09,0x02], 'g':[0x0c,0x52,0x52,0x3e], 'h':[0x7f,0x08,0x04,0x78],
      'i':[0x00,0x44,0x7d,0x40], 'j':[0x20,0x40,0x44,0x3d], 'k':[0x7f,0x10,0x28,0x44], 'l':[0x00,0x41,0x7f,0x40],
      'm':[0x7c,0x04,0x18,0x04,0x78], 'n':[0x7c,0x08,0x04,0x78], 'o':[0x38,0x44,0x44,0x38], 'p':[0x84,0xfe,0x24,0x18],
      'q':[0x18,0x24,0xfe,0x84], 'r':[0x7c,0x08,0x04,0x08], 's':[0x48,0x54,0x54,0x24], 't':[0x04,0x3e,0x44,0x24],
      'u':[0x3c,0x40,0x20,0x7c], 'v':[0x1c,0x20,0x40,0x20,0x1c], 'w':[0x3c,0x40,0x30,0x40,0x3c], 'x':[0x44,0x28,0x10,0x28,0x44],
      'y':[0x0c,0x50,0x50,0x3c], 'z':[0x44,0x64,0x54,0x4c], ' ':[0x00,0x00,0x00],
      '0':[0x3e,0x51,0x49,0x45,0x3e],'1':[0x00,0x42,0x7f,0x40,0x00],'2':[0x42,0x61,0x51,0x49,0x46],'3':[0x21,0x41,0x45,0x4b,0x31],
      '4':[0x18,0x14,0x12,0x7f,0x10],'5':[0x27,0x45,0x45,0x45,0x39],'6':[0x3c,0x4a,0x49,0x49,0x30],'7':[0x01,0x71,0x09,0x05,0x03],
      '8':[0x36,0x49,0x49,0x49,0x36],'9':[0x06,0x49,0x49,0x29,0x1e],
      '.':[0x60,0x60], ',':[0x80,0x60], '!':[0x7d,0x00], '?':[0x02,0x01,0x51,0x09,0x06]
    };

    let buffer = []; // Kayan yazı şeridi
    const emptySutun = 0x00;

    // 1. Ekranın sağından girmesi için 32 boşluk ekle (MD_Parola PA_SCROLL_LEFT mantığı)
    for(let i=0; i<cols; i++) buffer.push(emptySutun);

    // 2. Harfleri ve aralarındaki 1 piksellik boşluğu ekle
    for (let i = 0; i < yazi.length; i++) {
      let char = yazi[i];
      let charArray = font[char] || font['A']; // Bulamazsa A bas
      for (let col = 0; col < charArray.length; col++) {
        buffer.push(charArray[col]);
      }
      buffer.push(emptySutun); // Harf arası boşluk
    }

    // 3. Yazı bittikten sonra ekranın solundan tamamen çıkması için 32 boşluk daha
    for(let i=0; i<cols; i++) buffer.push(emptySutun);

    let offset = 0; // Kaydırma penceresinin başlangıç noktası

    function matrisiCiz() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Modül çerçeve çizgilerini çiz (4 tane 8x8 modül)
      ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
      for(let i=1; i<4; i++) {
         ctx.beginPath(); ctx.moveTo(i * 8 * dotSize, 0); ctx.lineTo(i * 8 * dotSize, canvas.height); ctx.stroke();
      }

      // Ekranda görünen 32 sütunu (pencereyi) çiz
      for (let x = 0; x < cols; x++) {
        let colData = buffer[offset + x]; // O anki sütun verisi
        
        for (let y = 0; y < rows; y++) {
          // Bit okuma (0. bit en üst satıra denk gelir)
          let isikAcik = (colData >> y) & 1;

          ctx.beginPath();
          ctx.arc(x * dotSize + dotSize/2, y * dotSize + dotSize/2, radius, 0, Math.PI * 2);
          
          if (isikAcik) {
            ctx.fillStyle = '#ff0000'; 
            ctx.shadowBlur = 12; ctx.shadowColor = '#ff0000';
          } else {
            ctx.fillStyle = '#110000'; 
            ctx.shadowBlur = 0;
          }
          ctx.fill();
        }
      }

      // Pencereyi 1 piksel kaydır
      offset++;
      
      // Şerit bittiyse animasyonu başa sar (MD_Parola displayReset() mantığı)
      if (offset > buffer.length - cols) {
        offset = 0;
      }

      // Akış Hızı milisaniyesine birebir uyması için setTimeout kullanıldı
      setTimeout(matrisiCiz, hiz);
    }

    // Animasyonu Başlat
    matrisiCiz();
  </script>
</body>
</html>
